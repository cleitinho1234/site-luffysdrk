<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luffysdrk Doações - Blox Fruits</title>
    <style>
        /* Configurações Gerais de Estilo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container Principal */
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #3b82f6;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        /* Subtítulo (Nome em cima) */
        .brand-name {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #3b82f6;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Título Principal */
        h1 {
            font-size: 2.5rem;
            color: #f59e0b; /* Amarelo Ouro */
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        /* Botões */
        .btn {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Classes de utilidade para alternar as páginas */
        .hidden {
            display: none !important;
        }

        /* Área da Foto da Conta */
        .conta-box {
            margin-top: 25px;
            border: 2px dashed #f59e0b;
            border-radius: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
        }

        .conta-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="pagina1" class="container">
        <p class="brand-name">Luffysdrk Doações</p>
        <h1>Pegue sua conta gratuita!</h1>
        <button class="btn" onclick="irParaPagina2()">Resgatar Conta</button>
    </div>

    <div id="pagina2" class="container hidden">
        <p class="brand-name">Luffysdrk Doações</p>
        <h1>Área de Resgate</h1>
        <p style="margin-bottom: 20px; color: #94a3b8;">Clique no botão abaixo para gerar seus dados de acesso.</p>
        
        <button id="btnPegar" class="btn" onclick="mostrarConta()">Pegue uma conta</button>

        <div id="resultadoConta" class="conta-box hidden">
            <h3 style="color: #10b981; margin-bottom: 10px;">✔ Conta Gerada com Sucesso!</h3>
            <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px;">Tire um print ou anote o usuário e senha abaixo:</p>
            <img src="https://via.placeholder.com/400x200.png?text=Usuario:+BloxKing123+%7C+Senha:+Luffy777" alt="Dados da Conta" class="conta-img">
        </div>
    </div>

    <script>
        function irParaPagina2() {
            document.getElementById('pagina1').classList.add('hidden');
            document.getElementById('pagina2').classList.remove('hidden');
        }

        function mostrarConta() {
            // Esconde o botão para a pessoa não clicar duas vezes
            document.getElementById('btnPegar').classList.add('hidden');
            // Mostra a caixinha com a foto da conta
            document.getElementById('resultadoConta').classList.remove('hidden');
        }
    </script>
</body>
</html>
