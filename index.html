<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Loja Blox Fruits - Entrega Automática</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f1a; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 40px; }
        .produto-info { background: #151526; padding: 20px; border-radius: 8px; border: 1px solid #2d2d44; }
        .produto-info h1 { color: #ffb703; font-size: 24px; margin-top: 0; }
        .banner { width: 100%; border-radius: 8px; margin-bottom: 15px; background: #2d2d44; height: 300px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #aaa; }
        .checkout-box { background: #1a1a30; padding: 20px; border-radius: 8px; border: 1px solid #ffb703; height: fit-content; text-align: center; }
        .preco { font-size: 32px; color: #25d366; font-weight: bold; margin: 15px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #3d3d5c; background: #0f0f1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #6f42c1; color: white; border: none; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #5a32a3; }
    </style>
</head>
<body>

<div class="container">
    <div class="produto-info">
        <div class="banner">FOTO DO SEU PRODUTO AQUI</div>
        <h1>🎁 BLOX FRUITS - CONTAS BARATAS | TTK | V4 | KITSUNE</h1>
        <p style="color: #b3b3cc;">Entrega automática após o pagamento.</p>
        <hr style="border: 0.5px solid #2d2d44;">
        <h3>Descrição do Produto</h3>
        <p>✓ Level 1000-2800 Garantido<br>✓ Frutas Míticas no Inventário<br>✓ Acesso total e imediato</p>
    </div>

    <div class="checkout-box">
        <div style="font-size: 14px; color: #aaa;">Preço do Produto</div>
        <div class="preco">R$ 1,99</div>
        
        <input type="text" id="nome" placeholder="Seu Nome">
        <input type="text" id="whatsapp" placeholder="Seu WhatsApp (com DDD)">
        
        <button onclick="comprar()">COMPRAR AGORA</button>
    </div>
</div>

<script>
    function comprar() {
        const nome = document.getElementById('nome').value;
        const whats = document.getElementById('whatsapp').value;
        
        if(!nome || !whats) {
            alert("Preencha todos os campos!");
            return;
        }

        // Sistema direto e gratuito: Envia os dados da venda direto para o seu WhatsApp!
        const mensagem = `Olá, quero comprar a Conta de Blox Fruits!\n\nNome: ${nome}\nWhatsApp: ${whats}`;
        const urlZap = `https://api.whatsapp.com/send?phone=SEUNUMERO&text=${encodeURIComponent(mensagem)}`;
        
        window.open(urlZap, '_blank');
    }
</script>

</body>
</html>
